name: Build java-cef (windows-amd64) as JAR and Release

on:
  push:
    tags:  # 推送v开头的Tag时自动发布Release
      - 'v*'
  workflow_dispatch:  # 手动触发（仅构建，不发布）

jobs:
  java-cef-windows-amd64:
    runs-on: [windows-2022]
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      
      # 1. 安装JDK（确保有jar命令）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # 若用Maven/Gradle可缓存，无则不影响
      
      # 2. 原有构建逻辑（生成windows_amd64目录）
      - name: Build windows-amd64 native files
        run: |
          mkdir jcef_build && cd jcef_build
          cmake -G "Ninja" -DPROJECT_ARCH=amd64 -DCMAKE_BUILD_TYPE=Release ..
          ninja -j4
          cd native
          ren Release windows_amd64
          cd ..
          move native/windows_amd64 windows_amd64
          python3 ../.github/workflows/scripts/generate_hash.py windows_amd64
          mv windows_amd64/.hash ./
      
      # 3. 新增：将windows_amd64目录打包为JAR文件
      - name: Package as JAR file
        run: |
          cd jcef_build
          # 用jar命令打包（c=创建，f=指定文件名，v=详细输出）
          jar cvf windows_amd64.jar windows_amd64/ .hash
          # 生成JAR文件的sha256校验（替换原有tar.gz的校验）
          Get-FileHash -Algorithm SHA256 -Path "windows_amd64.jar" | Out-File "windows_amd64.jar.sha256"
      
      # 4. 上传JAR产物（替换原有tar.gz）
      - uses: actions/upload-artifact@v4
        with:
          name: 'windows_amd64'
          path: |
            jcef_build/windows_amd64.jar
            jcef_build/windows_amd64.jar.sha256
          if-no-files-found: error

  # 发布JAR产物到Release
  release-to-github:
    needs: [java-cef-windows-amd64]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')  # 仅Tag推送时发布
    steps:
      - name: Download windows-amd64 JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: 'windows_amd64'

      - name: List artifact (调试用)
        run: |
          echo "=== 已下载的JAR产物 ==="
          ls -l
          echo "======================"

      - name: Create and publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 仅上传JAR和对应的sha256校验文件
          files: |
            windows_amd64.jar
            windows_amd64.jar.sha256
          # Release描述（适配JAR产物）
          body: |
            ## java-cef (windows-amd64) JAR 包发布
            - 构建Commit: ${{ github.sha }}
            - 构建时间: ${{ github.run_at }}
            - 产物类型: JAR 包（包含windows-amd64原生库）
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
