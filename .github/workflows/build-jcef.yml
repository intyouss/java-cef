name: Build java-cef (windows-amd64) and Release

on:
  push:
    tags:  # 推送v开头的Tag时自动发布Release（如v1.0.0）
      - 'v*'
  workflow_dispatch:  # 保留手动触发能力（Actions页面可手动运行）

jobs:
  # 仅保留 windows-amd64 平台构建
  java-cef-windows-amd64:
    runs-on: [windows-2022]
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Build windows-amd64
        run: |
          mkdir jcef_build && cd jcef_build
          cmake -G "Ninja" -DPROJECT_ARCH=amd64 -DCMAKE_BUILD_TYPE=Release ..
          ninja -j4
          cd native
          ren Release windows_amd64
          cd ..
          move native/windows_amd64 windows_amd64
          python3 ../.github/workflows/scripts/generate_hash.py windows_amd64
          mv windows_amd64/.hash ./
          tar -czf windows_amd64.tar.gz windows_amd64 .hash
          Get-FileHash -Algorithm SHA256 -Path "windows_amd64.tar.gz" | Out-File "windows_amd64.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: 'windows_amd64'
          path: |
            jcef_build/windows_amd64.tar.gz
            jcef_build/windows_amd64.tar.gz.sha256
          if-no-files-found: error

  # 发布 windows-amd64 产物到 GitHub Release
  release-to-github:
    needs: [java-cef-windows-amd64]  # 仅等待windows-amd64构建完成
    runs-on: ubuntu-24.04
    steps:
      - name: Download windows-amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: 'windows_amd64'  # 仅下载windows-amd64产物

      - name: List artifact (调试用，可删除)
        run: |
          echo "=== 已下载的windows-amd64产物 ==="
          ls -l
          echo "================================"

      - name: Create and publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 仅上传windows-amd64的产物
          files: |
            windows_amd64.tar.gz
            windows_amd64.tar.gz.sha256
          # Release 描述（适配windows-amd64）
          body: |
            ## java-cef (windows-amd64) 自动构建发布
            - 构建Commit: ${{ github.sha }}
            - 构建时间: ${{ github.run_at }}
            - 支持平台: windows-amd64
          # 是否为预发布版本（false=正式版，true=测试版）
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
