name: Build java-cef (windows-amd64) and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  java-cef-windows-amd64:
    runs-on: [windows-2022]
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Build windows-amd64
        run: |
          mkdir jcef_build && cd jcef_build
          cmake -G "Ninja" -DPROJECT_ARCH=amd64 -DCMAKE_BUILD_TYPE=Release ..
          ninja -j4
          cd native
          ren Release windows_amd64
          cd ..
          move native/windows_amd64 windows_amd64
          python3 ../.github/workflows/scripts/generate_hash.py windows_amd64
          mv windows_amd64/.hash ./
          tar -czf windows_amd64.tar.gz windows_amd64 .hash
          Get-FileHash -Algorithm SHA256 -Path "windows_amd64.tar.gz" | Out-File "windows_amd64.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: 'windows_amd64'
          path: |
            jcef_build/windows_amd64.tar.gz
            jcef_build/windows_amd64.tar.gz.sha256
          if-no-files-found: error

  release-to-github:
    needs: [java-cef-windows-amd64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4  # 新增：拉取代码，用于创建Tag
        with:
          fetch-depth: 0  # 必须：拉取所有历史，才能创建Tag

      - name: Create temporary tag (手动触发时)
        if: github.event_name == 'workflow_dispatch'  # 仅手动触发时创建
        run: |
          # 创建基于Commit ID的临时Tag（避免重复）
          TEMP_TAG="temp-$(git rev-parse --short HEAD)-$(date +%Y%m%d%H%M%S)"
          git tag $TEMP_TAG
          git push origin $TEMP_TAG
          echo "TEMP_TAG=$TEMP_TAG" >> $GITHUB_ENV  # 保存Tag名到环境变量

      - name: Download windows-amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: 'windows_amd64'

      - name: Create and publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TEMP_TAG || github.ref_name }}  # 优先用临时Tag，否则用推送的Tag
          files: |
            windows_amd64.tar.gz
            windows_amd64.tar.gz.sha256
          body: |
            ## java-cef (windows-amd64) 自动构建发布
            - 构建Commit: ${{ github.sha }}
            - 构建时间: ${{ github.run_at }}
            - 支持平台: windows-amd64
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
